<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>L'atelier — Minljiva</title>
</head>
<body>

  <header class="site-header" data-page="projets">
    <a href="index.html"><img src="Minljiva.png" alt="Minljiva"></a>
    <nav class="nav" id="main-nav"></nav>
  </header>

  <h1>L'atelier</h1>
  <p class="subtitle">Tous mes projets</p>

  <button class="btn-add" onclick="ouvrirModal()">+ Nouveau projet</button>

  <div class="filter-bar">
    <div class="filter-group-wrapper">
      <span class="filter-label">Projet</span>
      <button class="filter-btn active" onclick="filterProjet('all', this)">Tout</button>
      <button class="filter-btn" onclick="filterProjet('crochet', this)">CROCHET</button>
      <button class="filter-btn" onclick="filterProjet('coding', this)">CODING</button>
      <button class="filter-btn" onclick="filterProjet('autre', this)">AUTRE</button>
    </div>

    <div class="filter-group-wrapper">
      <span class="filter-label">Statut</span>
      <button class="filter-btn active" onclick="setFiltre('all', this)">Tout</button>
      <button class="filter-btn" onclick="setFiltre('todo', this)">TO DO</button>
      <button class="filter-btn" onclick="setFiltre('wip', this)">WIP</button>
      <button class="filter-btn" onclick="setFiltre('done', this)">DONE</button>
      <button class="filter-btn" onclick="setFiltre('archive', this)">📦 Archives</button>
    </div>
  </div>

  <div class="count-bar" id="count"></div>
  <div class="grid" id="grid">
    <div class="loading">Chargement des projets…</div>
  </div>

  <div class="overlay" id="overlay" onclick="fermerModalSiDehors(event)">
    <div class="modal">
      <h2>Nouveau projet</h2>
      <div class="field">
        <label>Nom du projet *</label>
        <input type="text" id="inp-titre" placeholder="ex : Bonnet rayé bleu" />
      </div>
      <div class="field">
        <label>Catégorie *</label>
        <select id="inp-categorie">
          <option value="CROCHET">Crochet 🧶</option>
          <option value="CODING">Coding ⚙️</option>
          <option value="AUTRE">Autre ✨</option>
        </select>
      </div>
      <div class="field">
        <label>inspiration (nom ou lien)</label>
        <input type="text" id="inp-inspiration" placeholder="Lien ou page.html" />
      </div>
      <div class="field">
        <label>Notes / Explications</label>
        <textarea id="inp-explication" placeholder="Laine, aiguilles..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-next" onclick="fermerModal()">Annuler</button>
        <button class="btn-save" id="btn-save" onclick="ajouterProjet()">Ajouter</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay-duree" onclick="fermerDureeSiDehors(event)">
    <div class="modal">
      <h2>✓ Projet terminé !</h2>
      <div class="field">
        <label>Temps passé (optionnel)</label>
        <input type="text" id="inp-duree" placeholder="ex : 12h, 3 séances…" />
      </div>
      <div class="modal-actions">
        <button class="btn-next" onclick="validerDuree(false)">Passer</button>
        <button class="btn-save" onclick="validerDuree(true)">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay" onclick="fermerDetail()"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="header-top-row">
        <div class="header-meta">
          <div id="d-statut-badge"></div>
          <div id="d-date" class="date"></div>
        </div>
        <button onclick="fermerDetail()" class="btn-close-detail">✕</button>
      </div>
      <div class="plant-name detail-titre" id="d-titre-affiche"></div>
    </div>
    <div class="detail-section detail-section-first">
      <div class="detail-label">Statut du projet</div>
      <select class="edit-input" id="d-statut">
        <option value="todo">TO DO</option>
        <option value="wip">WIP</option>
        <option value="done">DONE</option>
        <option value="archive">📦 Archivé</option>
      </select>
    </div>
    <div class="detail-section">
      <div class="detail-label">Nom du projet</div>
      <input class="edit-input" type="text" id="d-titre" />
    </div>
    <div class="detail-section">
      <label>Catégorie *</label>
      <select id="d-categorie" class="edit-input">
        <option value="CROCHET">Crochet 🧶</option>
        <option value="CODING">Coding ⚙️</option>
        <option value="AUTRE">Autre ✨</option>
      </select>
    </div>
    <div class="detail-section">
      <div class="detail-label">inspiration</div>
      <input class="edit-input" type="text" id="d-inspiration" />
    </div>
    <div class="detail-section">
      <div class="detail-label">Notes & explications</div>
      <textarea class="edit-textarea" id="d-explication-detail"></textarea>
    </div>
    <div class="detail-section">
      <div class="detail-label">Temps total passé</div>
      <input class="edit-input" type="text" id="d-duree" />
    </div>
    <button class="btn-edit-save btn-edit-save-full" id="btn-detail-save" onclick="sauvegarderDetail()">Enregistrer</button>
    <div class="save-ok" id="save-ok" style="display:none;">✓ Enregistré</div>
  </div>

  <script src="scripts/ATELIER.js"></script>
  <script src="scripts/nav.js"></script>
</body>
</html>
